[platformio]
src_dir = firmware/src
include_dir = firmware/include
test_dir = firmware/test

[env:native]
platform = native
test_framework = unity
build_flags =
  -std=gnu++17
  -I firmware/lib/laundry_detector
lib_extra_dirs = firmware/lib

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_extra_dirs = firmware/lib
lib_deps =
  adafruit/Adafruit LIS3DH@^1.3.0
  adafruit/Adafruit LSM6DS@^4.7.4
  adafruit/Adafruit Unified Sensor@^1.1.15
  bblanchon/ArduinoJson@^7.4.2
build_src_filter =
  +<*>
  +<../firmware/lib/laundry_detector/*.cpp>

[env:button_test]
extends = env:esp32dev
build_flags =
  -D LAUNDRY_BUTTON_TEST=1

[env:accel_led_test]
extends = env:esp32dev
build_flags =
  -D LAUNDRY_ACCEL_LED_TEST=1

[env:motion_request_test]
extends = env:esp32dev
build_flags =
  -D LAUNDRY_MOTION_REQUEST_TEST=1
  -D LAUNDRY_KEEP_WIFI_CONNECTED=1

[env:calibration_capture]
extends = env:esp32dev
build_flags =
  -D LAUNDRY_CALIBRATION_CAPTURE=1
  -D LAUNDRY_KEEP_WIFI_CONNECTED=1

[env:i2c_scan]
extends = env:esp32dev
build_flags =
  -D LAUNDRY_I2C_SCAN=1
