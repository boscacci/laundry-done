services:
  caddy:
    build: ./services/caddy
    restart: unless-stopped
    depends_on:
      relay:
        condition: service_healthy
      gotify:
        condition: service_healthy
    environment:
      AWS_REGION: us-west-2
      AWS_SDK_LOAD_CONFIG: "1"
    ports:
      - "127.0.0.1:8081:80"
      - "127.0.0.1:8444:443"
    volumes:
      - ./services/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./data/caddy/data:/data
      - ./data/caddy/config:/config
      - ${HOME}/.aws:/root/.aws:ro
    networks:
      default:
        aliases:
          - laundry.robertboscacci.com
          - gotify.robertboscacci.com

  relay:
    build: ./server
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_PATH: /data/events.sqlite3
    ports:
      - "8088:8080"
    volumes:
      - ./data/relay:/data
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/healthz', timeout=2).read()",
        ]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 10s

  gotify:
    image: gotify/server:latest
    restart: unless-stopped
    environment:
      GOTIFY_DEFAULTUSER_NAME: admin
      GOTIFY_DEFAULTUSER_PASS: ${GOTIFY_DEFAULTUSER_PASS}
    ports:
      - "127.0.0.1:8089:80"
    volumes:
      - ./data/gotify:/app/data

  warmup:
    build: ./server
    restart: unless-stopped
    depends_on:
      caddy:
        condition: service_started
      relay:
        condition: service_healthy
      gotify:
        condition: service_healthy
    command: ["python", "-m", "laundry_done_relay.warmup"]
    environment:
      WARMUP_URLS: ${WARMUP_URLS:-https://laundry.robertboscacci.com/healthz,https://gotify.robertboscacci.com/health}
      WARMUP_HOST_HEADERS: ${WARMUP_HOST_HEADERS:-}
      WARMUP_INTERVAL_SECONDS: ${WARMUP_INTERVAL_SECONDS:-300}
      WARMUP_TIMEOUT_SECONDS: ${WARMUP_TIMEOUT_SECONDS:-10}
      WARMUP_VERIFY_TLS: ${WARMUP_VERIFY_TLS:-false}
